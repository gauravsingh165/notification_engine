openapi: 3.0.1

info:
  title: Notification Engine API
  version: v1
  description: Backend API for async notification delivery.

servers:
  - url: http://localhost:3000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

paths:

  /admin/notifications:
    post:
      summary: Create notification
      tags:
        - Admin Notifications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Flash Sale
                message:
                  type: string
                  example: 70% discount today
                status:
                  type: string
                  example: draft
                scheduled_at:
                  type: string
                  format: date-time
                  example: "2026-03-12T10:30:00"
      responses:
        "201":
          description: Notification created

    get:
      summary: List notifications
      tags:
        - Admin Notifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of notifications

  /admin/notifications/{id}:
    get:
      summary: Get notification by ID
      tags:
        - Admin Notifications
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification details

  /admin/notifications/{id}/send_notification:
    post:
      summary: Send notification immediately
      tags:
        - Admin Notifications
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification sending started

  /notifications:
    get:
      summary: Get notifications for logged-in user
      tags:
        - User Notifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of notifications

  /notifications/{id}/read:
    post:
      summary: Mark notification as read
      tags:
        - User Notifications
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked as read